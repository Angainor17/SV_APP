# Detekt configuration for v2.0
# Documentation: https://detekt.dev/docs/rules/introduction

complexity:
  LongMethod:
    allowedLines: 60
    ignoreAnnotated: ['Composable']
  LongParameterList:
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
    ignoreDefaultParameters: true
  ComplexCondition:
    allowedConditions: 5
  CyclomaticComplexMethod:
    allowedComplexity: 20
    ignoreAnnotated: ['Composable']

coroutines:
  GlobalCoroutineUsage:
    active: true

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true

exceptions:
  TooGenericExceptionThrown:
    active: true
    # Запрещаем RuntimeException, Error, Throwable, Exception
    exceptionNames:
      - 'RuntimeException'
      - 'Exception'
      - 'Throwable'
      - 'Error'

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']
  VariableNaming:
    active: true
  ClassNaming:
    active: true

performance:
  ArrayPrimitive:
    active: true

style:
  MaxLineLength:
    maxLineLength: 120
    ignoreAnnotated: ['Composable']
  ForbiddenComment:
    active: false
  MagicNumber:
    active: false
  ReturnCount:
    max: 4
    excludeLabeled: false
    excludeReturnFromLambda: true
  UnnecessaryFullyQualifiedName:
    active: true

comments:
  DocumentationOverPrivateFunction:
    active: false
  DocumentationOverPrivateProperty:
    active: false